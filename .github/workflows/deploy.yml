name: Deploy to AWS S3

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify index.html exists
        run: |
          if [ ! -f index.html ]; then
            echo "ERROR: index.html not found"
            exit 1
          fi
          echo "OK: index.html found"

      - name: Check for localhost references
        run: |
          FOUND=0
          for file in $(find . -type f \( -name "*.html" -o -name "*.xml" -o -name "*.css" -o -name "*.js" -o -name "*.txt" \) -not -path './.git/*'); do
            if grep -l "localhost" "$file" >/dev/null 2>&1; then
              echo "ERROR: localhost reference in $file"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            exit 1
          fi
          echo "OK: No localhost references"

      - name: Count files
        run: |
          TOTAL=$(find . -type f -not -path './.git/*' -not -path './.github/*' | wc -l)
          echo "Deployable files: $TOTAL"

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Sync to S3
        run: |
          aws s3 sync . s3://moonlander.co.uk \
            --delete \
            --exclude '.git/*' \
            --exclude '.github/*' \
            --exclude 'README.md'

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id EPPT4RVY03S8S \
            --paths '/*'
